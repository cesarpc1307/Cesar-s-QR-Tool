<body class="font-body-md text-on-background">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TAB_DATOS = 'datos';
        const TAB_DIMENSIONES = 'dimensiones';
        const TAB_FORMAS = 'formas';
        const TAB_COLORES = 'colores';
        const TAB_LOGO = 'logo';

        const MaterialIcon = ({ name, className = "" }) => (
            <span className={`material-symbols-outlined ${className}`}>{name}</span>
        );

        const QRCodeItem = ({ line, logoUrl, qrColor, qrColor2, bgColor, fillType, dotStyle, eyeFrameStyle, eyePupilStyle, eyeFrameColor, showLabel, isTransparent, qrSize, quietZone, errorLevel }) => {
            const [imgSrc, setImgSrc] = useState(null);
            const [isHovered, setIsHovered] = useState(false);

            const firstSpace = line.trim().indexOf(' ');
            const url = firstSpace === -1 ? line.trim() : line.trim().substring(0, firstSpace);
            const labelContent = firstSpace === -1 ? "" : line.trim().substring(firstSpace + 1);

            useEffect(() => {
                if (!url) return;
                try {
                    const options = {
                        width: qrSize || 512,
                        height: qrSize || 512,
                        data: url,
                        image: logoUrl,
                        qrOptions: { errorCorrectionLevel: errorLevel || 'M' },
                        dotsOptions: {
                            type: dotStyle,
                            color: fillType === 'solid' ? qrColor : undefined,
                            gradient: fillType === 'gradient' ? {
                                type: 'linear',
                                rotation: Math.PI / 4,
                                colorStops: [{ offset: 0, color: qrColor }, { offset: 1, color: qrColor2 }]
                            } : undefined
                        },
                        backgroundOptions: { color: isTransparent ? 'rgba(0,0,0,0)' : bgColor },
                        cornersSquareOptions: { type: eyeFrameStyle || 'square', color: eyeFrameColor || qrColor },
                        cornersDotOptions: { type: eyePupilStyle || 'square', color: eyeFrameColor || qrColor },
                        imageOptions: { crossOrigin: "anonymous", margin: quietZone === 'compact' ? 2 : 10 }
                    };

                    const qr = new window.QRCodeStyling(options);
                    qr.getRawData("png").then(blob => {
                        const blobUrl = URL.createObjectURL(blob);
                        setImgSrc(blobUrl);
                    });
                } catch (e) {
                    console.error("Error creating QR Code item:", e);
                }
            }, [url, logoUrl, qrColor, qrColor2, bgColor, fillType, dotStyle, eyeFrameStyle, eyePupilStyle, eyeFrameColor, isTransparent, qrSize, quietZone, errorLevel]);

            const handleDownload = () => {
                if (imgSrc) {
                    const link = document.createElement('a');
                    link.href = imgSrc;
                    link.download = `qr_${labelContent || 'code'}.png`;
                    link.click();
                }
            };

            return (
                <div
                    className="print-item group relative bg-white border border-slate-200 p-4 rounded-3xl shadow-sm hover:shadow-md transition-all duration-300 flex flex-col items-center gap-3 w-full flex-shrink-0"
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                >
                    <div className="relative w-full aspect-square bg-slate-50 rounded-2xl overflow-hidden flex items-center justify-center p-2">
                        {imgSrc ? (
                            <img src={imgSrc} className="w-full h-full object-contain" alt="QR Code" />
                        ) : (
                            <div className="w-full h-full flex items-center justify-center"><MaterialIcon name="sync" className="animate-spin text-slate-300" /></div>
                        )}

                        {/* Centered Download Button on Hover */}
                        <div className={`absolute inset-0 bg-white/20 backdrop-blur-[2px] flex items-center justify-center transition-opacity duration-300 ${isHovered ? 'opacity-100' : 'opacity-0'}`}>
                            <button
                                onClick={handleDownload}
                                className="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-primary hover:scale-110 active:scale-95 transition-transform"
                            >
                                <MaterialIcon name="download" className="text-[24px]" />
                            </button>
                        </div>
                    </div>
                    {/* Label Area */}
                    {showLabel && labelContent && (
                        <div className="text-center w-full px-1">
                            <p className="text-xs font-semibold text-slate-700 mt-0.5 truncate">{labelContent}</p>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState(TAB_DATOS);
            // 'config' | 'preview' — controls which panel is visible on mobile
            const [mobileView, setMobileView] = useState('config');
            const [bulkText, setBulkText] = useState("https://qrstudiopro.io\nhttps://example.com");
            const [appliedBulkText, setAppliedBulkText] = useState("https://qrstudiopro.io\nhttps://example.com");

            const [dotStyle, setDotStyle] = useState('square');
            const [eyeFrameStyle, setEyeFrameStyle] = useState('square');
            const [eyePupilStyle, setEyePupilStyle] = useState('square');
            const [eyeFrameColor, setEyeFrameColor] = useState('#3525cd');

            const [fillType, setFillType] = useState('solid');
            const [qrColor, setQrColor] = useState('#3525cd');
            const [qrColor2, setQrColor2] = useState('#39b8fd');
            const [bgColor, setBgColor] = useState('#ffffff');

            const [logoUrl, setLogoUrl] = useState(null);
            const [showLabel, setShowLabel] = useState(true);
            const [appliedShowLabel, setAppliedShowLabel] = useState(true);
            const [isTransparent, setIsTransparent] = useState(false);
            const [printColumns, setPrintColumns] = useState(4);
            const [qrSize, setQrSize] = useState(300);
            const [quietZone, setQuietZone] = useState('standard');
            const [errorLevel, setErrorLevel] = useState('M');

            const qrRef = useRef(null);
            const qrCodeGenerator = useRef(null);

            useEffect(() => {
                try {
                    const lines = bulkText.split('\n').filter(l => l.trim() !== '');
                    let firstUrl = 'https://qrstudiopro.io';
                    if (lines.length > 0) {
                        const firstLine = lines[0].trim();
                        const spaceIdx = firstLine.indexOf(' ');
                        firstUrl = spaceIdx === -1 ? firstLine : firstLine.substring(0, spaceIdx);
                    }

                    const opts = {
                        width: 256,
                        height: 256,
                        type: "svg",
                        data: firstUrl,
                        image: logoUrl,
                        qrOptions: { errorCorrectionLevel: errorLevel },
                        dotsOptions: {
                            type: dotStyle,
                            color: fillType === 'solid' ? qrColor : undefined,
                            gradient: fillType === 'gradient' ? {
                                type: 'linear',
                                rotation: Math.PI / 4,
                                colorStops: [{ offset: 0, color: qrColor }, { offset: 1, color: qrColor2 }]
                            } : undefined
                        },
                        backgroundOptions: { color: isTransparent ? 'rgba(0,0,0,0)' : bgColor },
                        cornersSquareOptions: { type: eyeFrameStyle, color: eyeFrameColor },
                        cornersDotOptions: { type: eyePupilStyle, color: eyeFrameColor },
                        imageOptions: { crossOrigin: "anonymous", margin: quietZone === 'compact' ? 2 : 5 }
                    };

                    qrCodeGenerator.current = new window.QRCodeStyling(opts);

                    if (qrRef.current) {
                        qrRef.current.innerHTML = '';
                        qrCodeGenerator.current.append(qrRef.current);
                    }
                } catch (e) {
                    console.error("Preview render error:", e);
                }
            }, [bulkText, dotStyle, eyeFrameStyle, eyePupilStyle, eyeFrameColor, qrColor, qrColor2, bgColor, fillType, logoUrl, isTransparent, quietZone, errorLevel]);

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => setLogoUrl(event.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const downloadAllZip = async () => {
                if (bulkText !== appliedBulkText) return;
                try {
                    const lines = appliedBulkText.split('\n').filter(l => l.trim() !== '');
                    if (lines.length === 0) return alert('Por favor, ingresa al menos un dato válido.');

                    const zip = new window.JSZip();
                    const folder = zip.folder("codigos_qr");

                    const baseOptions = {
                        width: qrSize,
                        height: qrSize,
                        image: logoUrl,
                        qrOptions: { errorCorrectionLevel: errorLevel },
                        dotsOptions: {
                            type: dotStyle,
                            color: fillType === 'solid' ? qrColor : undefined,
                            gradient: fillType === 'gradient' ? {
                                type: 'linear',
                                rotation: Math.PI / 4,
                                colorStops: [{ offset: 0, color: qrColor }, { offset: 1, color: qrColor2 }]
                            } : undefined
                        },
                        backgroundOptions: { color: isTransparent ? 'rgba(0,0,0,0)' : bgColor },
                        cornersSquareOptions: { type: eyeFrameStyle, color: eyeFrameColor },
                        cornersDotOptions: { type: eyePupilStyle, color: eyeFrameColor },
                        imageOptions: { crossOrigin: "anonymous", margin: quietZone === 'compact' ? 2 : 10 }
                    };

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        const spaceIdx = line.indexOf(' ');
                        const url = spaceIdx === -1 ? line : line.substring(0, spaceIdx);
                        const tempLabel = spaceIdx === -1 ? `qr_code_${i + 1}` : line.substring(spaceIdx + 1);
                        const safeLabel = tempLabel.replace(/[^a-zA-Z0-9]/gi, '_').substring(0, 30);

                        const qr = new window.QRCodeStyling({
                            ...baseOptions,
                            data: url
                        });

                        const blob = await qr.getRawData("png");
                        folder.file(`${i + 1}_${safeLabel}.png`, blob);
                    }

                    const zipBlob = await zip.generateAsync({ type: "blob" });
                    window.saveAs(zipBlob, `codigos_qr_${new Date().getTime()}.zip`);
                } catch (e) {
                    console.error("Zip download error:", e);
                    alert("Error generando ZIP: " + e.message);
                }
            };

            const printAll = () => {
                if (bulkText !== appliedBulkText) return;
                const lines = appliedBulkText.split('\n').filter(l => l.trim() !== '');
                if (lines.length === 0) return alert('Por favor, ingresa al menos un dato valido.');
                setTimeout(() => window.print(), 500);
            };

            const isDirty = bulkText !== appliedBulkText || showLabel !== appliedShowLabel;

            const renderSidebarItem = (id, icon, label) => (
                <button
                    className={`tab-btn flex items-center gap-3 px-3 py-2 rounded-md transition-all border border-transparent ${activeTab === id ? 'active shadow-sm' : 'text-slate-600 hover:bg-slate-100'}`}
                    onClick={() => setActiveTab(id)}
                >
                    <MaterialIcon name={icon} className="text-[20px]" />
                    <span className="font-medium text-sm">{label}</span>
                </button>
            );

            return (
                <React.Fragment>
                    {/* ===== MAIN APP SHELL (no-print) ===== */}
                    <div className="flex flex-col no-print" style={{height: '100dvh', overflow: 'hidden'}}>

                        {/* ── TOP HEADER ── */}
                        <header className="bg-white flex items-center justify-between px-4 md:px-8 w-full h-14 md:h-16 border-b border-slate-200 z-50 flex-shrink-0">
                            <div className="flex items-center gap-4 md:gap-8">
                                <h1 className="text-lg md:text-xl font-bold tracking-tight text-indigo-600">César's QR Tool</h1>
                                <nav className="hidden md:flex items-center gap-6 h-16">
                                    <a className="text-indigo-600 font-semibold border-b-2 border-indigo-600 h-16 flex items-center pt-1" href="#">Generador</a>
                                    <a className="text-slate-500 hover:text-indigo-600 transition-colors h-16 flex items-center" href="#">My Codes</a>
                                    <a className="text-slate-500 hover:text-indigo-600 transition-colors h-16 flex items-center" href="#">Templates</a>
                                </nav>
                            </div>
                            <div className="flex items-center gap-2 md:gap-4 text-slate-500">
                                <button className="w-11 h-11 flex items-center justify-center rounded-lg hover:text-indigo-600 hover:bg-slate-100 active:scale-95 transition-all">
                                    <MaterialIcon name="settings" />
                                </button>
                                <button className="w-11 h-11 hidden md:flex items-center justify-center rounded-lg hover:text-indigo-600 hover:bg-slate-100 active:scale-95 transition-all">
                                    <MaterialIcon name="help" />
                                </button>
                                <button className="w-11 h-11 flex items-center justify-center rounded-lg hover:text-indigo-600 hover:bg-slate-100 active:scale-95 transition-all">
                                    <MaterialIcon name="account_circle" />
                                </button>
                            </div>
                        </header>

                        {/* ── MOBILE VIEW SWITCHER (Config / Preview) ── */}
                        <div className="mobile-view-tabs bg-white border-b border-slate-200 flex-shrink-0">
                            <button
                                onClick={() => setMobileView('config')}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 text-sm font-semibold border-b-2 transition-colors ${
                                    mobileView === 'config'
                                        ? 'border-indigo-600 text-indigo-600'
                                        : 'border-transparent text-slate-500'
                                }`}
                            >
                                <MaterialIcon name="tune" className="text-[20px]" />
                                Configurar
                            </button>
                            <button
                                onClick={() => setMobileView('preview')}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 text-sm font-semibold border-b-2 transition-colors ${
                                    mobileView === 'preview'
                                        ? 'border-indigo-600 text-indigo-600'
                                        : 'border-transparent text-slate-500'
                                }`}
                            >
                                <MaterialIcon name="grid_view" className="text-[20px]" />
                                Vista Previa
                                {isDirty && <span className="w-2 h-2 rounded-full bg-amber-500 flex-shrink-0"></span>}
                            </button>
                        </div>

                        {/* ── BODY: SIDEBAR + MAIN ── */}
                        <div className="flex flex-grow overflow-hidden">

                            {/* ── DESKTOP SIDEBAR ── */}
                            <aside className="desktop-sidebar bg-slate-50 flex flex-col h-full p-4 gap-2 w-64 border-r border-slate-200 flex-shrink-0">
                                <div className="mb-4 px-3">
                                    <h2 className="text-lg font-bold text-slate-900">Configuración</h2>
                                    <p className="text-xs text-slate-500">Opciones del QR</p>

                                                                onClick={() => setPrintColumns(num)}
                                                                className={`w-8 h-8 rounded-lg text-xs font-bold transition-all ${printColumns === num ? 'bg-indigo-600 text-white shadow-md shadow-indigo-200' : 'text-slate-500 hover:bg-slate-200'}`}
                                                            >
                                                                {num}
                                                            </button>
                                                        ))}
                                                    </div>

                                                    {/* Quick Actions */}
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            onClick={printAll}
                                                            disabled={isDirty}
                                                            className={`flex items-center gap-2 px-3 md:px-4 py-2.5 rounded-xl text-sm font-bold border transition-all min-h-[44px] ${isDirty ? 'bg-slate-50 text-slate-300 border-slate-100' : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50 active:scale-95'}`}
                                                        >
                                                            <MaterialIcon name="print" className="text-[18px]" />
                                                            <span className="hidden sm:inline">Imprimir</span>
                                                        </button>
                                                        <button
                                                            onClick={downloadAllZip}
                                                            disabled={isDirty}
                                                            className={`flex items-center gap-2 px-3 md:px-4 py-2.5 rounded-xl text-sm font-bold transition-all min-h-[44px] ${isDirty ? 'bg-slate-200 text-slate-400' : 'bg-slate-900 text-white hover:bg-slate-800 active:scale-95 shadow-lg shadow-slate-200'}`}
                                                        >
                                                            <MaterialIcon name="folder_zip" className="text-[18px]" />
                                                            ZIP
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* --- Gallery Body --- */}
                                            <div className="p-4 md:p-8 flex-grow custom-scrollbar overflow-y-auto" style={{maxHeight: 'calc(100dvh - 180px)'}}>
                                                <div className="mb-4 md:mb-6 flex flex-wrap items-center justify-between gap-2">
                                                    <h3 className="text-sm md:text-md font-bold text-slate-800">Galería ({appliedBulkText.split('\n').filter(l => l.trim() !== '').length})</h3>
                                                    {isDirty && (
                                                        <div className="flex items-center gap-2 text-amber-600 px-3 py-1 bg-amber-50 rounded-full border border-amber-100">
                                                            <MaterialIcon name="warning" className="text-[14px]" />
                                                            <span className="text-[10px] font-bold uppercase hidden sm:inline">Cambios detectados — Actualizar</span>
                                                            <span className="text-[10px] font-bold uppercase sm:hidden">Actualizar</span>
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Fluid grid: 2 cols on mobile, respects printColumns on md+ */}
                                                <div
                                                    className="qr-gallery-grid"
                                                    style={window.innerWidth >= 768 ? { gridTemplateColumns: `repeat(${printColumns}, minmax(0, 1fr))` } : undefined}
                                                >
                                                    {appliedBulkText.split('\n').filter(l => l.trim() !== '').map((line, idx) => (
                                                        <QRCodeItem
                                                            key={idx}
                                                            line={line}
                                                            logoUrl={logoUrl}
                                                            qrColor={qrColor}
                                                            qrColor2={qrColor2}
                                                            bgColor={bgColor}
                                                            fillType={fillType}
                                                            dotStyle={dotStyle}
                                                            eyeFrameStyle={eyeFrameStyle}
                                                            eyePupilStyle={eyePupilStyle}
                                                            eyeFrameColor={eyeFrameColor}
                                                            showLabel={appliedShowLabel}
                                                            isTransparent={isTransparent}
                                                            qrSize={qrSize}
                                                            quietZone={quietZone}
                                                            errorLevel={errorLevel}
                                                        />
                                                    ))}

                                                    {appliedBulkText.split('\n').filter(l => l.trim() !== '').length === 0 && (
                                                        <div className="col-span-full h-48 md:h-64 border-2 border-dashed border-slate-100 rounded-2xl md:rounded-[2rem] flex flex-col items-center justify-center gap-4 text-center px-6 md:px-10">
                                                            <div className="w-14 h-14 md:w-16 md:h-16 bg-slate-50 rounded-full flex items-center justify-center">
                                                                <MaterialIcon name="qr_code_scanner" className="text-slate-300 text-[28px] md:text-[32px]" />
                                                            </div>
                                                            <div>
                                                                <p className="text-slate-500 font-bold text-sm">Sin resultados generados</p>
                                                                <p className="text-slate-400 text-xs mt-1">Ingresa el contenido y presiona Generar QRs.</p>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </main>
                        </div>
                    </div>

                    {/* Mobile Bottom Navigation Bar */}
                    <nav className="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 z-50 flex justify-around no-print safe-area-inset-bottom">
                        {[
                            { tab: TAB_DATOS,       icon: 'link',               label: 'Contenido' },
                            { tab: TAB_DIMENSIONES, icon: 'aspect_ratio',       label: 'Dimensiones' },
                            { tab: TAB_FORMAS,      icon: 'grid_view',          label: 'Diseño' },
                            { tab: TAB_COLORES,     icon: 'palette',            label: 'Colores' },
                            { tab: TAB_LOGO,        icon: 'add_photo_alternate',label: 'Logo' },
                        ].map(({ tab, icon, label }) => (
                            <button
                                key={tab}
                                onClick={() => { setActiveTab(tab); setMobileView('config'); }}
                                className={`flex flex-col items-center justify-center flex-1 py-2 gap-0.5 min-h-[56px] transition-colors ${activeTab === tab && mobileView === 'config' ? 'text-indigo-600' : 'text-slate-400'}`}
                            >
                                <MaterialIcon name={icon} className={`text-[22px] ${activeTab === tab && mobileView === 'config' ? 'fill-1' : ''}`} />
                                <span className="text-[9px] font-semibold leading-tight">{label}</span>
                            </button>
                        ))}
                    </nav>

                    <div className="hidden print-area bg-white min-h-screen">
                        <div className="text-center mb-6 py-4 border-b border-slate-200">
                            <h1 className="text-2xl font-bold text-slate-800">Galería de Resultados</h1>
                        </div>
                        <div className="print-grid" style={{ gridTemplateColumns: `repeat(${printColumns}, minmax(0, 1fr))` }}>
                            {appliedBulkText.split('\n').filter(l => l.trim() !== '').map((line, idx) => (
                                <QRCodeItem key={idx} line={line} logoUrl={logoUrl} qrColor={qrColor} qrColor2={qrColor2} bgColor={bgColor} fillType={fillType} dotStyle={dotStyle} eyeFrameStyle={eyeFrameStyle} eyePupilStyle={eyePupilStyle} eyeFrameColor={eyeFrameColor} showLabel={appliedShowLabel} isTransparent={isTransparent} qrSize={qrSize} quietZone={quietZone} errorLevel={errorLevel} />
                            ))}
                        </div>
                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
