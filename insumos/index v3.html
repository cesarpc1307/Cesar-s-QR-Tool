<body class="font-body-md text-on-background">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TAB_DATOS = 'datos';
        const TAB_DIMENSIONES = 'dimensiones';
        const TAB_FORMAS = 'formas';
        const TAB_COLORES = 'colores';
        const TAB_LOGO = 'logo';

        const MaterialIcon = ({ name, className = "" }) => (
            <span className={`material-symbols-outlined ${className}`}>{name}</span>
        );

        const QRCodeItem = ({ line, logoUrl, qrColor, qrColor2, bgColor, fillType, dotStyle, eyeStyle, showLabel, isTransparent, qrSize, quietZone, errorLevel }) => {
            const [imgSrc, setImgSrc] = useState(null);
            const [isHovered, setIsHovered] = useState(false);

            const firstSpace = line.trim().indexOf(' ');
            const url = firstSpace === -1 ? line.trim() : line.trim().substring(0, firstSpace);
            const labelContent = firstSpace === -1 ? "" : line.trim().substring(firstSpace + 1);

            useEffect(() => {
                if (!url) return;
                try {
                    const options = {
                        width: qrSize || 512,
                        height: qrSize || 512,
                        data: url,
                        image: logoUrl,
                        qrOptions: { errorCorrectionLevel: errorLevel || 'M' },
                        dotsOptions: {
                            type: dotStyle,
                            color: fillType === 'solid' ? qrColor : undefined,
                            gradient: fillType === 'gradient' ? {
                                type: 'linear',
                                rotation: Math.PI / 4,
                                colorStops: [{ offset: 0, color: qrColor }, { offset: 1, color: qrColor2 }]
                            } : undefined
                        },
                        backgroundOptions: { color: isTransparent ? 'rgba(0,0,0,0)' : bgColor },
                        cornersSquareOptions: { type: eyeStyle, color: qrColor },
                        imageOptions: { crossOrigin: "anonymous", margin: quietZone === 'compact' ? 2 : 10 }
                    };

                    const qr = new window.QRCodeStyling(options);
                    qr.getRawData("png").then(blob => {
                        const blobUrl = URL.createObjectURL(blob);
                        setImgSrc(blobUrl);
                    });
                } catch (e) {
                    console.error("Error creating QR Code item:", e);
                }
            }, [url, logoUrl, qrColor, qrColor2, bgColor, fillType, dotStyle, eyeStyle, isTransparent, qrSize, quietZone, errorLevel]);

            const handleDownload = () => {
                if (imgSrc) {
                    const link = document.createElement('a');
                    link.href = imgSrc;
                    link.download = `qr_${labelContent || 'code'}.png`;
                    link.click();
                }
            };

            return (
                <div
                    className="print-item group relative bg-white border border-slate-200 p-4 rounded-3xl shadow-sm hover:shadow-md transition-all duration-300 flex flex-col items-center gap-3 w-48 sm:w-56 flex-shrink-0"
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                >
                    <div className="relative w-full aspect-square bg-slate-50 rounded-2xl overflow-hidden flex items-center justify-center p-2">
                        {imgSrc ? (
                            <img src={imgSrc} className="w-full h-full object-contain" alt="QR Code" />
                        ) : (
                            <div className="w-full h-full flex items-center justify-center"><MaterialIcon name="sync" className="animate-spin text-slate-300" /></div>
                        )}

                        {/* Centered Download Button on Hover */}
                        <div className={`absolute inset-0 bg-white/20 backdrop-blur-[2px] flex items-center justify-center transition-opacity duration-300 ${isHovered ? 'opacity-100' : 'opacity-0'}`}>
                            <button
                                onClick={handleDownload}
                                className="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-primary hover:scale-110 active:scale-95 transition-transform"
                            >
                                <MaterialIcon name="download" className="text-[24px]" />
                            </button>
                        </div>
                    </div>
                    {/* Label Area */}
                    {showLabel && labelContent && (
                        <div className="text-center w-full px-1">
                            <p className="text-xs font-semibold text-slate-700 mt-0.5 truncate">{labelContent}</p>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState(TAB_DATOS);
            const [bulkText, setBulkText] = useState("https://qrstudiopro.io\nhttps://example.com");
            const [appliedBulkText, setAppliedBulkText] = useState("https://qrstudiopro.io\nhttps://example.com");

            const [dotStyle, setDotStyle] = useState('square');
            const [eyeStyle, setEyeStyle] = useState('square');

            const [fillType, setFillType] = useState('solid');
            const [qrColor, setQrColor] = useState('#3525cd');
            const [qrColor2, setQrColor2] = useState('#39b8fd');
            const [bgColor, setBgColor] = useState('#ffffff');

            const [logoUrl, setLogoUrl] = useState(null);
            const [showLabel, setShowLabel] = useState(true);
            const [appliedShowLabel, setAppliedShowLabel] = useState(true);
            const [isTransparent, setIsTransparent] = useState(false);
            const [printColumns, setPrintColumns] = useState(4);
            const [qrSize, setQrSize] = useState(300);
            const [quietZone, setQuietZone] = useState('standard');
            const [errorLevel, setErrorLevel] = useState('M');

            const qrRef = useRef(null);
            const qrCodeGenerator = useRef(null);

            useEffect(() => {
                try {
                    const lines = bulkText.split('\n').filter(l => l.trim() !== '');
                    let firstUrl = 'https://qrstudiopro.io';
                    if (lines.length > 0) {
                        const firstLine = lines[0].trim();
                        const spaceIdx = firstLine.indexOf(' ');
                        firstUrl = spaceIdx === -1 ? firstLine : firstLine.substring(0, spaceIdx);
                    }

                    const opts = {
                        width: 256,
                        height: 256,
                        type: "svg",
                        data: firstUrl,
                        image: logoUrl,
                        qrOptions: { errorCorrectionLevel: errorLevel },
                        dotsOptions: {
                            type: dotStyle,
                            color: fillType === 'solid' ? qrColor : undefined,
                            gradient: fillType === 'gradient' ? {
                                type: 'linear',
                                rotation: Math.PI / 4,
                                colorStops: [{ offset: 0, color: qrColor }, { offset: 1, color: qrColor2 }]
                            } : undefined
                        },
                        backgroundOptions: { color: isTransparent ? 'rgba(0,0,0,0)' : bgColor },
                        cornersSquareOptions: { type: eyeStyle, color: qrColor },
                        imageOptions: { crossOrigin: "anonymous", margin: quietZone === 'compact' ? 2 : 5 }
                    };

                    qrCodeGenerator.current = new window.QRCodeStyling(opts);

                    if (qrRef.current) {
                        qrRef.current.innerHTML = '';
                        qrCodeGenerator.current.append(qrRef.current);
                    }
                } catch (e) {
                    console.error("Preview render error:", e);
                }
            }, [bulkText, dotStyle, eyeStyle, qrColor, qrColor2, bgColor, fillType, logoUrl, isTransparent, quietZone, errorLevel]);

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => setLogoUrl(event.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const downloadAllZip = async () => {
                if (bulkText !== appliedBulkText) return;
                try {
                    const lines = appliedBulkText.split('\n').filter(l => l.trim() !== '');
                    if (lines.length === 0) return alert('Por favor, ingresa al menos un dato válido.');

                    const zip = new window.JSZip();
                    const folder = zip.folder("codigos_qr");

                    const baseOptions = {
                        width: qrSize,
                        height: qrSize,
                        image: logoUrl,
                        qrOptions: { errorCorrectionLevel: errorLevel },
                        dotsOptions: {
                            type: dotStyle,
                            color: fillType === 'solid' ? qrColor : undefined,
                            gradient: fillType === 'gradient' ? {
                                type: 'linear',
                                rotation: Math.PI / 4,
                                colorStops: [{ offset: 0, color: qrColor }, { offset: 1, color: qrColor2 }]
                            } : undefined
                        },
                        backgroundOptions: { color: isTransparent ? 'rgba(0,0,0,0)' : bgColor },
                        cornersSquareOptions: { type: eyeStyle, color: qrColor },
                        imageOptions: { crossOrigin: "anonymous", margin: quietZone === 'compact' ? 2 : 10 }
                    };

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        const spaceIdx = line.indexOf(' ');
                        const url = spaceIdx === -1 ? line : line.substring(0, spaceIdx);
                        const tempLabel = spaceIdx === -1 ? `qr_code_${i + 1}` : line.substring(spaceIdx + 1);
                        const safeLabel = tempLabel.replace(/[^a-zA-Z0-9]/gi, '_').substring(0, 30);

                        const qr = new window.QRCodeStyling({
                            ...baseOptions,
                            data: url
                        });

                        const blob = await qr.getRawData("png");
                        folder.file(`${i + 1}_${safeLabel}.png`, blob);
                    }

                    const zipBlob = await zip.generateAsync({ type: "blob" });
                    window.saveAs(zipBlob, `codigos_qr_${new Date().getTime()}.zip`);
                } catch (e) {
                    console.error("Zip download error:", e);
                    alert("Error generando ZIP: " + e.message);
                }
            };

            const printAll = () => {
                if (bulkText !== appliedBulkText) return;
                const lines = appliedBulkText.split('\n').filter(l => l.trim() !== '');
                if (lines.length === 0) return alert('Por favor, ingresa al menos un dato valido.');
                setTimeout(() => window.print(), 500);
            };

            const isDirty = bulkText !== appliedBulkText || showLabel !== appliedShowLabel;

            const renderSidebarItem = (id, icon, label) => (
                <button
                    className={`tab-btn flex items-center gap-3 px-3 py-2 rounded-md transition-all border border-transparent ${activeTab === id ? 'active shadow-sm' : 'text-slate-600 hover:bg-slate-100'}`}
                    onClick={() => setActiveTab(id)}
                >
                    <MaterialIcon name={icon} className="text-[20px]" />
                    <span className="font-medium text-sm">{label}</span>
                </button>
            );

            return (
                <React.Fragment>
                    <div className="flex flex-col h-screen overflow-hidden no-print">
                        <header className="bg-white flex items-center justify-between px-8 w-full h-16 border-b border-slate-200 z-50 flex-shrink-0">
                            <div className="flex items-center gap-8">
                                <h1 className="text-xl font-bold tracking-tight text-indigo-600">QR Studio Pro</h1>
                                <nav className="hidden md:flex items-center gap-6 h-16">
                                    <a className="text-indigo-600 font-semibold border-b-2 border-indigo-600 h-16 flex items-center pt-1" href="#">Dashboard</a>
                                    <a className="text-slate-500 hover:text-indigo-600 transition-colors h-16 flex items-center" href="#">My Codes</a>
                                    <a className="text-slate-500 hover:text-indigo-600 transition-colors h-16 flex items-center" href="#">Templates</a>
                                </nav>
                            </div>
                            <div className="flex items-center gap-4 text-slate-500">
                                <button className="hover:text-indigo-600 active:scale-95 transition-all">
                                    <MaterialIcon name="settings" />
                                </button>
                                <button className="hover:text-indigo-600 active:scale-95 transition-all">
                                    <MaterialIcon name="help" />
                                </button>
                                <button className="hover:text-indigo-600 active:scale-95 transition-all">
                                    <MaterialIcon name="account_circle" />
                                </button>
                            </div>
                        </header>

                        <div className="flex flex-grow overflow-hidden h-[calc(100vh-64px)]">
                            <aside className="bg-slate-50 flex flex-col h-full p-4 gap-2 w-64 border-r border-slate-200 flex-shrink-0">
                                <div className="mb-4 px-3">
                                    <h2 className="text-lg font-bold text-slate-900">Configuración</h2>
                                    <p className="text-xs text-slate-500">Opciones del QR</p>
                                </div>
                                <nav className="flex flex-col gap-1 flex-grow overflow-y-auto">
                                    {renderSidebarItem(TAB_DATOS, 'link', 'Contenido')}
                                    {renderSidebarItem(TAB_DIMENSIONES, 'aspect_ratio', 'Dimensiones')}
                                    {renderSidebarItem(TAB_FORMAS, 'grid_view', 'Diseño')}
                                    <button className="flex items-center gap-3 text-slate-600 px-3 py-2 hover:bg-slate-100 transition-all">
                                        <MaterialIcon name="rounded_corner" className="text-[20px]" />
                                        <span className="font-medium text-sm">Esquinas</span>
                                    </button>
                                    {renderSidebarItem(TAB_COLORES, 'palette', 'Colores')}
                                    {renderSidebarItem(TAB_LOGO, 'add_photo_alternate', 'Logo')}
                                    <button className="flex items-center gap-3 text-slate-600 px-3 py-2 hover:bg-slate-100 transition-all">
                                        <MaterialIcon name="download" className="text-[20px]" />
                                        <span className="font-medium text-sm">Exportar</span>
                                    </button>
                                </nav>
                                <button
                                    onClick={() => {
                                        setAppliedBulkText(bulkText);
                                        setAppliedShowLabel(showLabel);
                                    }}
                                    className={`mt-auto w-full py-3 rounded-lg font-bold text-sm transition-all shadow-sm active:scale-95 flex items-center justify-center gap-2 ${isDirty ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-slate-200 text-slate-500 cursor-default'}`}
                                >
                                    <MaterialIcon name={isDirty ? 'sync' : 'check_circle'} className="text-[18px]" />
                                    {isDirty ? 'Actualizar' : 'Generado'}
                                </button>
                            </aside>

                            <main className="flex-grow overflow-y-auto bg-[#F8FAFC]">
                                <div className="max-w-6xl mx-auto p-10 grid grid-cols-1 lg:grid-cols-12 gap-10 min-h-full">
                                    <div className="lg:col-span-5 space-y-6 pb-10">
                                        {activeTab === TAB_DIMENSIONES && (
                                            <section className="bg-white border border-outline-variant p-6 rounded-xl shadow-sm space-y-8">
                                                <div>
                                                    <h3 className="font-title-md text-on-surface mb-1">Tamaño de Exportación</h3>
                                                    <p className="text-body-md text-on-surface-variant mb-4">Resolución de los archivos PNG generados.</p>
                                                    <div className="grid grid-cols-1 gap-2">
                                                        {[
                                                            { px: 300, label: 'Estándar (300px)', desc: 'Para uso digital o etiquetas pequeñas.' },
                                                            { px: 600, label: 'Alta Definición (600px)', desc: 'Para documentos impresos claros.' },
                                                            { px: 1000, label: 'Imprenta Profesional (1000px)', desc: 'Para posters o lonas grandes.' }
                                                        ].map(({ px, label, desc }) => (
                                                            <button
                                                                key={px}
                                                                onClick={() => setQrSize(px)}
                                                                className={`flex items-center gap-3 p-3 rounded-xl border text-left transition-colors ${qrSize === px ? 'border-2 border-primary bg-primary/5' : 'border-outline-variant hover:border-primary/50'}`}
                                                            >
                                                                <span className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 ${qrSize === px ? 'bg-primary text-white' : 'bg-slate-100 text-slate-500'}`}>{px === 300 ? 'S' : px === 600 ? 'M' : 'L'}</span>
                                                                <div>
                                                                    <p className={`text-sm font-semibold ${qrSize === px ? 'text-primary' : 'text-slate-700'}`}>{label}</p>
                                                                    <p className="text-[11px] text-slate-500 mt-0.5">{desc}</p>
                                                                </div>
                                                                {qrSize === px && <MaterialIcon name="check_circle" className="ml-auto text-primary fill-1" />}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="border-t border-outline-variant pt-6">
                                                    <h3 className="font-title-md text-on-surface mb-1">Margen de Seguridad</h3>
                                                    <p className="text-body-md text-on-surface-variant mb-4">Espacio en blanco alrededor del código.</p>
                                                    <div className="grid grid-cols-2 gap-3">
                                                        {[
                                                            { val: 'standard', icon: 'border_outer', label: 'Estándar', desc: 'Garantiza lectura en cualquier fondo.' },
                                                            { val: 'compact', icon: 'border_inner', label: 'Compacto', desc: 'Mínimo espacio, para diseños ajustados.' }
                                                        ].map(({ val, icon, label, desc }) => (
                                                            <button
                                                                key={val}
                                                                onClick={() => setQuietZone(val)}
                                                                className={`flex flex-col items-center gap-2 p-4 rounded-xl border transition-colors ${quietZone === val ? 'border-2 border-primary bg-primary/5' : 'border-outline-variant hover:border-primary/50'}`}
                                                            >
                                                                <MaterialIcon name={icon} className={quietZone === val ? 'text-primary' : 'text-slate-400'} />
                                                                <span className={`text-sm font-semibold ${quietZone === val ? 'text-primary' : 'text-slate-700'}`}>{label}</span>
                                                                <span className="text-[10px] text-slate-500 text-center leading-tight">{desc}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="border-t border-outline-variant pt-6">
                                                    <h3 className="font-title-md text-on-surface mb-1">Columnas de Impresión</h3>
                                                    <p className="text-body-md text-on-surface-variant mb-4">Organización de códigos en la hoja.</p>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        {[
                                                            { cols: 2, icon: 'view_column', label: '2 Cols', desc: 'Señalización' },
                                                            { cols: 4, icon: 'grid_view', label: '4 Cols', desc: 'Predeterminado' },
                                                            { cols: 6, icon: 'apps', label: '6 Cols', desc: 'Etiquetas' }
                                                        ].map(({ cols, icon, label, desc }) => (
                                                            <button
                                                                key={cols}
                                                                onClick={() => setPrintColumns(cols)}
                                                                className={`flex flex-col items-center gap-1.5 p-3 rounded-xl border transition-colors ${printColumns === cols ? 'border-2 border-primary bg-primary/5' : 'border-outline-variant hover:border-primary/50'}`}
                                                            >
                                                                <MaterialIcon name={icon} className={printColumns === cols ? 'text-primary' : 'text-slate-400'} />
                                                                <span className={`text-xs font-bold ${printColumns === cols ? 'text-primary' : 'text-slate-700'}`}>{label}</span>
                                                                <span className="text-[10px] text-slate-500">{desc}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="border-t border-outline-variant pt-6">
                                                    <h3 className="font-title-md text-on-surface mb-1">Resiliencia del Código</h3>
                                                    <p className="text-body-md text-on-surface-variant mb-4">Nivel de corrección de errores.</p>
                                                    <div className="grid grid-cols-2 gap-3">
                                                        {[
                                                            { lvl: 'M', icon: 'balance', label: 'Nivel Medio (M)', desc: 'Equilibrio perfecto entre diseño y lectura.' },
                                                            { lvl: 'H', icon: 'shield', label: 'Nivel Alto (H)', desc: 'Recomendado con logo grande en el centro.' }
                                                        ].map(({ lvl, icon, label, desc }) => (
                                                            <button
                                                                key={lvl}
                                                                onClick={() => setErrorLevel(lvl)}
                                                                className={`flex flex-col items-center gap-2 p-4 rounded-xl border transition-colors ${errorLevel === lvl ? 'border-2 border-primary bg-primary/5' : 'border-outline-variant hover:border-primary/50'}`}
                                                            >
                                                                <MaterialIcon name={icon} className={errorLevel === lvl ? 'text-primary' : 'text-slate-400'} />
                                                                <span className={`text-sm font-semibold ${errorLevel === lvl ? 'text-primary' : 'text-slate-700'}`}>{label}</span>
                                                                <span className="text-[10px] text-slate-500 text-center leading-tight">{desc}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </section>
                                        )}

                                        {activeTab === TAB_DATOS && (
                                            <section className="bg-white border border-outline-variant p-lg rounded-xl shadow-sm">
                                                <div className="mb-4">
                                                    <h3 className="font-title-md text-on-surface">Contenido</h3>
                                                    <p className="text-body-md text-on-surface-variant">El destino de tu código QR al ser escaneado.</p>
                                                </div>
                                                <textarea
                                                    className="w-full h-72 px-md py-base border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-mono text-sm leading-relaxed whitespace-pre-wrap"
                                                    placeholder={"https://example.com/url-1 Mi Etiqueta 1\nhttps://example.com/url-2 SinEtiqueta"}
                                                    value={bulkText}
                                                    onChange={(e) => setBulkText(e.target.value)}
                                                ></textarea>

                                                <div className="mt-6 pt-4 border-t border-slate-100">
                                                    <label className="flex items-center gap-3 cursor-pointer group">
                                                        <input
                                                            type="checkbox"
                                                            className="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary transition-all cursor-pointer"
                                                            checked={showLabel}
                                                            onChange={(e) => setShowLabel(e.target.checked)}
                                                        />
                                                        <div>
                                                            <span className="text-sm font-semibold text-slate-700 group-hover:text-primary transition-colors">Mostrar Etiqueta</span>
                                                            <p className="text-[11px] text-slate-500 mt-0.5">Si se activa, el texto después del espacio en cada línea se mostrará debajo del QR.</p>
                                                        </div>
                                                    </label>
                                                </div>
                                            </section>
                                        )}

                                        {activeTab === TAB_FORMAS && (
                                            <section className="bg-white border border-outline-variant p-6 rounded-xl shadow-sm space-y-6">
                                                <div>
                                                    <h3 className="font-title-md text-on-surface mb-1">Estilo de Puntos</h3>
                                                    <p className="text-body-md text-on-surface-variant mb-4">El patrón principal del código QR.</p>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        {[{ s: 'square', i: 'grid_4x4' }, { s: 'dots', i: 'lens' }, { s: 'rounded', i: 'apps' }, { s: 'extra-rounded', i: 'motion_photos_on' }, { s: 'classy', i: 'auto_awesome' }].map(({ s, i }) => (
                                                            <button
                                                                key={s}
                                                                className={`flex flex-col items-center justify-center gap-1.5 p-3 rounded-xl border transition-colors ${dotStyle === s ? 'border-2 border-primary bg-primary/5' : 'border-outline-variant hover:border-primary/50'}`}
                                                                onClick={() => setDotStyle(s)}
                                                            >
                                                                <MaterialIcon name={i} className={dotStyle === s ? 'text-primary' : 'text-slate-500'} />
                                                                <span className="text-[11px] font-medium capitalize mt-1">{s.replace('-', ' ')}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="border-t border-outline-variant pt-6">
                                                    <h3 className="font-title-md text-on-surface mb-1">Esquinas (Ojos)</h3>
                                                    <p className="text-body-md text-on-surface-variant mb-4">La forma de los marcos de posicionamiento.</p>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        {[{ s: 'square', i: 'square' }, { s: 'dot', i: 'check_box_outline_blank' }, { s: 'extra-rounded', i: 'circle' }].map(({ s, i }) => (
                                                            <button
                                                                key={s}
                                                                className={`flex flex-col items-center justify-center gap-1.5 p-3 rounded-xl border transition-colors ${eyeStyle === s ? 'border-2 border-primary bg-primary/5' : 'border-outline-variant hover:border-primary/50'}`}
                                                                onClick={() => setEyeStyle(s)}
                                                            >
                                                                <MaterialIcon name={i} className={eyeStyle === s ? 'text-primary' : 'text-slate-500'} />
                                                                <span className="text-[11px] font-medium capitalize mt-1">{s.replace('-', ' ')}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </section>
                                        )}

                                        {activeTab === TAB_COLORES && (
                                            <section className="bg-white border border-outline-variant p-6 rounded-xl shadow-sm space-y-6">
                                                <div>
                                                    <div className="flex items-center justify-between mb-4">
                                                        <h3 className="font-title-md text-on-surface">Relleno del QR</h3>
                                                        <div className="flex bg-slate-100 p-1 rounded-lg">
                                                            <button
                                                                className={`px-3 py-1 font-medium text-xs rounded-md transition-all ${fillType === 'solid' ? 'bg-white shadow text-primary' : 'text-slate-500'}`}
                                                                onClick={() => setFillType('solid')}
                                                            >Sólido</button>
                                                            <button
                                                                className={`px-3 py-1 font-medium text-xs rounded-md transition-all ${fillType === 'gradient' ? 'bg-white shadow text-primary' : 'text-slate-500'}`}
                                                                onClick={() => setFillType('gradient')}
                                                            >Degradado</button>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col gap-4">
                                                        <label className="text-xs font-semibold text-slate-500 uppercase tracking-widest">{fillType === 'gradient' ? 'Primario' : 'Frontal'}</label>
                                                        <div className="flex items-center gap-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                                            <input className="color-swatch-input" type="color" value={qrColor} onChange={(e) => setQrColor(e.target.value)} />
                                                            <span className="text-sm font-mono text-on-surface-variant uppercase">{qrColor}</span>
                                                        </div>

                                                        {fillType === 'gradient' && (
                                                            <React.Fragment>
                                                                <label className="text-xs font-semibold text-slate-500 uppercase tracking-widest mt-2">Secundario</label>
                                                                <div className="flex items-center gap-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                                                    <input className="color-swatch-input" type="color" value={qrColor2} onChange={(e) => setQrColor2(e.target.value)} />
                                                                    <span className="text-sm font-mono text-on-surface-variant uppercase">{qrColor2}</span>
                                                                </div>
                                                            </React.Fragment>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="border-t border-outline-variant pt-6">
                                                    <div className="flex items-center justify-between mb-3">
                                                        <h3 className="font-title-md text-on-surface">Color Fondo</h3>
                                                        <label className="flex items-center gap-2 cursor-pointer group">
                                                            <input
                                                                type="checkbox"
                                                                className="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary transition-all"
                                                                checked={isTransparent}
                                                                onChange={(e) => setIsTransparent(e.target.checked)}
                                                            />
                                                            <span className="text-xs font-semibold text-slate-500 uppercase tracking-widest group-hover:text-primary transition-colors">Transparente</span>
                                                        </label>
                                                    </div>
                                                    <div className={`flex flex-col gap-4 transition-opacity duration-300 ${isTransparent ? 'opacity-40 pointer-events-none' : 'opacity-100'}`}>
                                                        <div className="flex items-center gap-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                                                            <input className="color-swatch-input" type="color" value={bgColor} onChange={(e) => setBgColor(e.target.value)} disabled={isTransparent} />
                                                            <span className="text-sm font-mono text-on-surface-variant uppercase">{bgColor}</span>
                                                        </div>
                                                        <div className="flex gap-3 mt-1">
                                                            {['#ffffff', '#f8fafc', '#fefce8', '#f0fdf4'].map(preset => (
                                                                <button key={preset} onClick={() => setBgColor(preset)} disabled={isTransparent} className="w-8 h-8 rounded-full border border-slate-300 hover:scale-110 transition-transform shadow-sm" style={{ backgroundColor: preset }} title={preset}></button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </section>
                                        )}

                                        {activeTab === TAB_LOGO && (
                                            <section className="bg-white border border-outline-variant p-6 rounded-xl shadow-sm">
                                                <div className="mb-4">
                                                    <h3 className="font-title-md text-on-surface">Logo</h3>
                                                </div>
                                                <label className="relative flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-lg hover:border-indigo-500 hover:bg-indigo-50 cursor-pointer">
                                                    <MaterialIcon name="upload" className="text-slate-400 mb-2" />
                                                    <span className="text-sm text-slate-600 font-medium">{logoUrl ? 'Cambiar Logo' : 'Seleccionar Archivo'}</span>
                                                    <input accept="image/*" className="hidden" type="file" onChange={handleLogoUpload} />
                                                </label>
                                                {logoUrl && (
                                                    <div className="mt-4 flex flex-col items-center p-4 bg-slate-50 rounded-lg border border-slate-200">
                                                        <img src={logoUrl} alt="Logo" className="max-h-20 object-contain drop-shadow-sm rounded" />
                                                        <button onClick={() => setLogoUrl(null)} className="mt-3 text-xs text-red-600 font-medium hover:underline hover:text-red-700">Quitar logo</button>
                                                    </div>
                                                )}
                                            </section>
                                        )}
                                    </div>

                                    <div className="lg:col-span-7 flex flex-col gap-6">
                                        <div className="lg:col-span-12 space-y-6">
                                            <div className="bg-white border border-outline-variant rounded-xl shadow-sm p-8 relative overflow-hidden">
                                                <div className="flex items-center justify-between mb-8">
                                                    <span className="px-3 py-1 bg-primary-container text-on-primary-container rounded-full text-xs font-bold uppercase tracking-wider">Live Preview</span>
                                                    <div className="flex items-center gap-2 text-slate-400">
                                                        <MaterialIcon name="info" className="text-[16px]" />
                                                        <span className="text-xs font-medium">Puedes descargar cada código de forma individual.</span>
                                                    </div>
                                                </div>

                                                <div className="flex gap-6 overflow-x-auto pb-4 custom-scrollbar snap-x">
                                                    {appliedBulkText.split('\n').filter(l => l.trim() !== '').map((line, idx) => (
                                                        <div key={idx} className="snap-start">
                                                            <QRCodeItem
                                                                line={line}
                                                                logoUrl={logoUrl}
                                                                qrColor={qrColor}
                                                                qrColor2={qrColor2}
                                                                bgColor={bgColor}
                                                                fillType={fillType}
                                                                dotStyle={dotStyle}
                                                                eyeStyle={eyeStyle}
                                                                showLabel={appliedShowLabel}
                                                                isTransparent={isTransparent}
                                                                qrSize={qrSize}
                                                                quietZone={quietZone}
                                                                errorLevel={errorLevel}
                                                            />
                                                        </div>
                                                    ))}
                                                    {appliedBulkText.split('\n').filter(l => l.trim() !== '').length === 0 && (
                                                        <div className="w-full h-48 border-2 border-dashed border-slate-100 rounded-3xl flex flex-col items-center justify-center gap-2">
                                                            <MaterialIcon name="qr_code_2" className="text-slate-200 text-[48px]" />
                                                            <p className="text-slate-400 font-medium italic">Esperando datos para generar...</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-white border border-outline-variant p-6 rounded-xl shadow-sm">
                                            <div className="flex items-start justify-between mb-5">
                                                <div>
                                                    <h3 className="font-title-md text-on-surface border-l-4 border-indigo-600 pl-3">Exportación Masiva</h3>
                                                    <p className="text-body-md text-on-surface-variant mt-1 pl-3">
                                                        Listos para exportar: <span className="font-bold text-on-surface">{appliedBulkText.split('\n').filter(l => l.trim() !== '').length}</span> códigos QR.
                                                        {isDirty && <span className="block text-[10px] text-amber-600 font-medium">Hay cambios pendientes de actualizar</span>}
                                                    </p>
                                                </div>
                                                <div className="flex flex-col items-end gap-1">
                                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-widest">Columnas Impresión</label>
                                                    <select
                                                        className="border border-slate-200 rounded-lg text-sm text-slate-700 py-2 px-3 focus:ring-2 focus:ring-primary focus:border-primary cursor-pointer bg-white shadow-sm"
                                                        value={printColumns}
                                                        onChange={(e) => setPrintColumns(Number(e.target.value))}
                                                    >
                                                        {[2, 3, 4, 5, 6].map(num => (<option key={num} value={num}>{num} Columnas</option>))}
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <button
                                                    onClick={downloadAllZip}
                                                    disabled={isDirty}
                                                    className={`flex items-center justify-center gap-2 px-6 py-3 border-2 rounded-xl font-bold text-sm transition-all shadow-sm ${isDirty ? 'border-slate-200 text-slate-300 cursor-not-allowed' : 'border-indigo-600 text-indigo-600 hover:bg-indigo-50 active:scale-95'}`}
                                                >
                                                    <MaterialIcon name="folder_zip" />
                                                    Descargar ZIP
                                                </button>
                                                <button
                                                    onClick={printAll}
                                                    disabled={isDirty}
                                                    className={`flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold text-sm transition-all shadow-md ${isDirty ? 'bg-slate-100 text-slate-300 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-lg active:scale-95'}`}
                                                >
                                                    <MaterialIcon name="print" />
                                                    Imprimir Todos
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </main>
                        </div>
                    </div>

                    {/* Mobile Bottom Navigation */}
                    <footer className="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 z-50 flex justify-around py-2 no-print">
                        <button onClick={() => setActiveTab(TAB_FORMAS)} className={`flex flex-col items-center ${activeTab === TAB_FORMAS ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <MaterialIcon name="grid_view" className={activeTab === TAB_FORMAS ? 'fill-1' : ''} />
                            <span className="text-[10px] font-semibold">Diseño</span>
                        </button>
                        <button onClick={() => setActiveTab(TAB_DATOS)} className={`flex flex-col items-center ${activeTab === TAB_DATOS ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <MaterialIcon name="link" className={activeTab === TAB_DATOS ? 'fill-1' : ''} />
                            <span className="text-[10px] font-semibold">Contenido</span>
                        </button>
                        <button className="flex flex-col items-center text-slate-400">
                            <MaterialIcon name="download" />
                            <span className="text-[10px]">Exportar</span>
                        </button>
                        <button className="flex flex-col items-center text-slate-400">
                            <MaterialIcon name="account_circle" />
                            <span className="text-[10px]">Perfil</span>
                        </button>
                    </footer>

                    <div className="hidden print-area bg-white min-h-screen">
                        <div className="text-center mb-6 py-4 border-b border-slate-200">
                            <h1 className="text-2xl font-bold text-slate-800">Galería de Resultados</h1>
                        </div>
                        <div className="print-grid" style={{ gridTemplateColumns: `repeat(${printColumns}, minmax(0, 1fr))` }}>
                            {appliedBulkText.split('\n').filter(l => l.trim() !== '').map((line, idx) => (
                                <QRCodeItem key={idx} line={line} logoUrl={logoUrl} qrColor={qrColor} qrColor2={qrColor2} bgColor={bgColor} fillType={fillType} dotStyle={dotStyle} eyeStyle={eyeStyle} showLabel={appliedShowLabel} isTransparent={isTransparent} qrSize={qrSize} quietZone={quietZone} errorLevel={errorLevel} />
                            ))}
                        </div>
                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
