
<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>QR Studio Pro - Generador Masivo Premium</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fonts: Inter & Outfit for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Libraries -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#DDD6FE',
                            300: '#C4B5FD',
                            400: '#A78BFA',
                            500: '#8B5CF6',
                            600: '#7C3AED',
                            700: '#6D28D9',
                            800: '#5B21B6',
                            900: '#4C1D95',
                        },
                        surface: {
                            50: '#F8FAFC',
                            100: '#F1F5F9',
                            200: '#E2E8F0',
                            300: '#CBD5E1',
                            400: '#94A3B8',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-subtle': 'pulseSubtle 2s infinite ease-in-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        pulseSubtle: { '0%, 100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.02)' } },
                    },
                    boxShadow: {
                        'premium': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05)',
                        'glass': 'inset 0 0 0 1px rgba(255, 255, 255, 0.2)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --brand-primary: #7C3AED;
        }

        body {
            background-color: #F8FAFC;
            color: #1E293B;
            -webkit-font-smoothing: antialiased;
        }

        /* Glassmorphism components */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.2s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* Color inputs */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border-radius: 6px; border: 1px solid #E2E8F0; }

        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100%; }
            body { background: white !important; }
            @page { margin: 15mm; }
        }

        .qr-gradient-bg {
            background: radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
        }

        .tab-active {
            color: var(--brand-primary);
            background: rgba(124, 58, 237, 0.08);
            box-shadow: inset 0 0 0 1px rgba(124, 58, 237, 0.2);
        }
    </style>
</head>

<body class="font-sans antialiased text-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Constants
        const TABS = [
            { id: 'datos', label: 'Datos', icon: 'List' },
            { id: 'diseno', label: 'Formas', icon: 'Shapes' },
            { id: 'colores', label: 'Colores', icon: 'Palette' },
            { id: 'logo', label: 'Logo', icon: 'Image' },
            { id: 'exportar', label: 'Exportar', icon: 'Download' }
        ];

        const DOT_STYLES = [
            { id: 'square', label: 'Cuadrado', icon: 'Square' },
            { id: 'dots', label: 'Puntos', icon: 'Circle' },
            { id: 'rounded', label: 'Redondeado', icon: 'Square' },
            { id: 'extra-rounded', label: 'Circular', icon: 'CircleDot' },
            { id: 'classy', label: 'Elegante', icon: 'Star' }
        ];

        const EYE_STYLES = [
            { id: 'square', label: 'Cuadrado' },
            { id: 'extra-rounded', label: 'Suave' },
            { id: 'dot', label: 'Círculo' }
        ];

        // Components
        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide && window.lucide.icons[name]) {
                    iconRef.current.innerHTML = window.lucide.icons[name].toSvg({
                        width: size,
                        height: size,
                        class: className
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const Card = ({ children, className = "" }) => (
            <div className={`glass-card rounded-2xl p-6 animate-fade-in ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, variant = 'primary', onClick, className = "", disabled, icon }) => {
            const themes = {
                primary: 'bg-brand-600 text-white hover:bg-brand-700 shadow-lg shadow-brand-500/20 active:scale-95',
                secondary: 'bg-white text-slate-700 border border-slate-200 hover:bg-slate-50 active:scale-95',
                outline: 'border-2 border-brand-600 text-brand-600 hover:bg-brand-50 active:scale-95'
            };
            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled}
                    className={`flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl font-semibold transition-all duration-200 disabled:opacity-50 disabled:pointer-events-none ${themes[variant]} ${className}`}
                >
                    {icon && <LucideIcon name={icon} size={18} />}
                    {children}
                </button>
            );
        };

        const QRCodeItem = ({ line, options }) => {
            const [imgSrc, setImgSrc] = useState(null);
            const firstSpace = line.trim().indexOf(' ');
            const url = firstSpace === -1 ? line.trim() : line.trim().substring(0, firstSpace);
            const label = firstSpace === -1 ? line.trim() : line.trim().substring(firstSpace + 1);

            useEffect(() => {
                if (!url) return;
                const qr = new QRCodeStyling({
                    ...options,
                    width: 400,
                    height: 400,
                    data: url,
                });

                qr.getRawData("png").then(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    setImgSrc(blobUrl);
                });
            }, [url, JSON.stringify(options)]);

            return (
                <div className="flex flex-col items-center p-4 border border-slate-100 rounded-xl bg-white shadow-sm break-inside-avoid">
                    {imgSrc ? (
                        <img src={imgSrc} className="w-full aspect-square" alt="QR" />
                    ) : (
                        <div className="w-full aspect-square bg-slate-50 animate-pulse rounded-lg flex items-center justify-center">
                            <span className="text-[10px] text-slate-400">Generando...</span>
                        </div>
                    )}
                    <span className="mt-2 text-[10px] font-bold text-slate-800 text-center truncate w-full uppercase tracking-tighter">{label}</span>
                </div>
            );
        };

        // Main App
        const App = () => {
            const [activeTab, setActiveTab] = useState('datos');
            const [bulkText, setBulkText] = useState("https://google.com Google\nhttps://apple.com Apple\nhttps://github.com GitHub");
            
            // Design State
            const [config, setConfig] = useState({
                dotStyle: 'square',
                eyeStyle: 'square',
                fillType: 'solid',
                color1: '#7C3AED',
                color2: '#A78BFA',
                bgColor: '#ffffff',
                logoUrl: null,
                printColumns: 4
            });

            const qrRef = useRef(null);
            const qrInstance = useRef(null);

            const qrOptions = useMemo(() => ({
                width: 300,
                height: 300,
                type: "svg",
                image: config.logoUrl,
                dotsOptions: {
                    type: config.dotStyle,
                    color: config.fillType === 'solid' ? config.color1 : undefined,
                    gradient: config.fillType === 'gradient' ? {
                        type: 'linear',
                        rotation: Math.PI / 4,
                        colorStops: [{ offset: 0, color: config.color1 }, { offset: 1, color: config.color2 }]
                    } : undefined
                },
                backgroundOptions: { color: config.bgColor },
                cornersSquareOptions: { type: config.eyeStyle, color: config.color1 },
                imageOptions: { crossOrigin: "anonymous", margin: 10, imageSize: 0.4 }
            }), [config]);

            useEffect(() => {
                const previewUrl = bulkText.split('\n').filter(l => l.trim())[0]?.split(' ')[0] || "https://qr-studio.pro";
                
                qrInstance.current = new QRCodeStyling({
                    ...qrOptions,
                    data: previewUrl
                });

                if (qrRef.current) {
                    qrRef.current.innerHTML = '';
                    qrInstance.current.append(qrRef.current);
                }
            }, [qrOptions, bulkText]);

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setConfig(prev => ({ ...prev, logoUrl: ev.target.result }));
                    reader.readAsDataURL(file);
                }
            };

            const downloadAllZip = async () => {
                const lines = bulkText.split('\n').filter(l => l.trim() !== '');
                if (lines.length === 0) return;

                const zip = new JSZip();
                const folder = zip.folder("QRCodes");

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    const url = line.split(' ')[0];
                    const label = (line.split(' ').slice(1).join(' ') || `qr_${i}`).replace(/[^a-z0-9]/gi, '_');

                    const qr = new QRCodeStyling({
                        ...qrOptions,
                        width: 1000,
                        height: 1000,
                        data: url
                    });

                    const blob = await qr.getRawData("png");
                    folder.file(`${label}.png`, blob);
                }

                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, "qr-studio-pro-pack.zip");
            };

            const totalQRs = bulkText.split('\n').filter(l => l.trim()).length;

            return (
                <div className="flex h-screen bg-slate-50 relative overflow-hidden">
                    {/* Floating Background Elements */}
                    <div className="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
                        <div className="absolute -top-20 -left-20 w-96 h-96 bg-brand-200/20 rounded-full blur-[100px]"></div>
                        <div className="absolute top-1/2 left-2/3 w-64 h-64 bg-blue-200/10 rounded-full blur-[80px]"></div>
                    </div>

                    {/* Sidebar */}
                    <aside className="no-print w-20 lg:w-72 bg-white/70 backdrop-blur-xl border-r border-slate-200 flex flex-col z-20 transition-all duration-300">
                        <div className="p-8 pb-4">
                            <h2 className="hidden lg:block font-display text-2xl font-bold text-slate-800 tracking-tight">Configuración</h2>
                            <p className="hidden lg:block text-xs font-medium text-slate-400 mt-1 uppercase tracking-widest leading-none">Opciones del QR</p>
                            
                            {/* Logo solo icono para mobile/compact */}
                            <div className="lg:hidden w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center mx-auto">
                                <LucideIcon name="Settings" size={24} className="text-white" />
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-6 space-y-3">
                            {TABS.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`w-full flex items-center justify-center lg:justify-start gap-4 px-4 py-3 rounded-2xl transition-all duration-300 group ${activeTab === tab.id ? 'tab-active' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}
                                >
                                    <LucideIcon name={tab.icon} size={20} className={activeTab === tab.id ? 'text-brand-600' : 'group-hover:text-slate-700 opacity-70'} />
                                    <span className="hidden lg:block font-semibold text-[15px]">{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="p-6 border-t border-slate-100">
                            <div className="hidden lg:flex items-center gap-3 p-3 bg-brand-50 rounded-2xl">
                                <LucideIcon name="Zap" size={16} className="text-brand-600" />
                                <div className="flex-1">
                                    <div className="text-[10px] font-bold text-brand-700 uppercase">Premium</div>
                                    <div className="text-[11px] text-brand-600">Actualizado v2.0</div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Workspace */}
                    <main className="no-print flex-1 flex flex-col lg:flex-row overflow-hidden z-10">
                        {/* Editor Section */}
                        <div className="flex-1 overflow-y-auto p-4 lg:p-10 hide-scrollbar scroll-smooth">
                            <div className="max-w-3xl mx-auto space-y-8 animate-slide-up">
                                
                                {activeTab === 'datos' && (
                                    <Card>
                                        <div className="flex items-center gap-3 mb-6">
                                            <div className="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                                                <LucideIcon name="List" className="text-blue-600" />
                                            </div>
                                            <div>
                                                <h2 className="font-display text-lg font-bold">Listado de Contenido</h2>
                                                <p className="text-sm text-slate-500">Un enlace por línea + espacio + nombre (opcional)</p>
                                            </div>
                                        </div>
                                        <textarea
                                            className="w-full h-80 p-5 rounded-2xl glass-input outline-none font-mono text-sm leading-relaxed"
                                            placeholder="https://example.com Mi Sitio Web"
                                            value={bulkText}
                                            onChange={(e) => setBulkText(e.target.value)}
                                        />
                                        <div className="mt-4 flex items-center gap-2 text-xs text-slate-400">
                                            <LucideIcon name="Info" size={12} />
                                            <span>El primer QR de la lista se mostrará como previsualización.</span>
                                        </div>
                                    </Card>
                                )}

                                {activeTab === 'diseno' && (
                                    <Card>
                                        <h3 className="font-bold mb-4 text-slate-800">Formato de Dibujo</h3>
                                        <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
                                            {DOT_STYLES.map(style => (
                                                <button
                                                    key={style.id}
                                                    onClick={() => setConfig(c => ({ ...c, dotStyle: style.id }))}
                                                    className={`flex flex-col items-center p-3 rounded-xl border-2 transition-all ${config.dotStyle === style.id ? 'border-brand-600 bg-brand-50 shadow-sm' : 'border-slate-100 bg-white hover:border-slate-200'}`}
                                                >
                                                    <LucideIcon name={style.icon} className={config.dotStyle === style.id ? 'text-brand-600' : 'text-slate-400'} />
                                                    <span className="text-[10px] font-bold mt-2 uppercase tracking-tight">{style.label}</span>
                                                </button>
                                            ))}
                                        </div>

                                        <h3 className="font-bold mt-8 mb-4 text-slate-800">Estilo de Ojos</h3>
                                        <div className="flex gap-3">
                                            {EYE_STYLES.map(style => (
                                                <button
                                                    key={style.id}
                                                    onClick={() => setConfig(c => ({ ...c, eyeStyle: style.id }))}
                                                    className={`px-4 py-2 rounded-lg border-2 text-xs font-bold transition-all ${config.eyeStyle === style.id ? 'border-brand-600 bg-brand-50 text-brand-600' : 'border-slate-100 text-slate-500 hover:border-slate-200'}`}
                                                >
                                                    {style.label}
                                                </button>
                                            ))}
                                        </div>
                                    </Card>
                                )}

                                {activeTab === 'colores' && (
                                    <Card>
                                        <h3 className="font-bold mb-6 text-slate-800">Esquema Cromático</h3>
                                        
                                        <div className="bg-slate-50 p-2 rounded-xl inline-flex mb-6">
                                            {['solid', 'gradient'].map(type => (
                                                <button
                                                    key={type}
                                                    onClick={() => setConfig(c => ({ ...c, fillType: type }))}
                                                    className={`px-4 py-2 rounded-lg text-xs font-bold capitalize transition-all ${config.fillType === type ? 'bg-white shadow-sm text-brand-600' : 'text-slate-500 hover:text-slate-700'}`}
                                                >
                                                    {type === 'solid' ? 'Sólido' : 'Degradado'}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[11px] font-bold text-slate-500 uppercase">Tono Principal</label>
                                                <div className="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl">
                                                    <input type="color" value={config.color1} onChange={e => setConfig(c => ({ ...c, color1: e.target.value }))} />
                                                    <span className="font-mono text-sm uppercase">{config.color1}</span>
                                                </div>
                                            </div>
                                            {config.fillType === 'gradient' && (
                                                <div className="space-y-2">
                                                    <label className="text-[11px] font-bold text-slate-500 uppercase">Tono Secundario</label>
                                                    <div className="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl">
                                                        <input type="color" value={config.color2} onChange={e => setConfig(c => ({ ...c, color2: e.target.value }))} />
                                                        <span className="font-mono text-sm uppercase">{config.color2}</span>
                                                    </div>
                                                </div>
                                            )}
                                            <div className="space-y-2">
                                                <label className="text-[11px] font-bold text-slate-500 uppercase">Fondo</label>
                                                <div className="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl">
                                                    <input type="color" value={config.bgColor} onChange={e => setConfig(c => ({ ...c, bgColor: e.target.value }))} />
                                                    <span className="font-mono text-sm uppercase">{config.bgColor}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>
                                )}

                                {activeTab === 'logo' && (
                                    <Card>
                                        <div className="text-center py-10 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50 hover:bg-slate-50 hover:border-brand-300 transition-all cursor-pointer relative overflow-hidden group">
                                            <input type="file" onChange={handleLogoUpload} className="absolute inset-0 opacity-0 cursor-pointer z-10" />
                                            <div className="relative z-0">
                                                <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto shadow-sm mb-4 group-hover:scale-110 transition-transform">
                                                    <LucideIcon name="Upload" className="text-brand-600" size={28} />
                                                </div>
                                                <p className="font-bold text-slate-700">Seleccionar o arrastrar logo</p>
                                                <p className="text-xs text-slate-400 mt-1">PNG, JPG o SVG (Recomendado fondo transparente)</p>
                                            </div>
                                        </div>
                                        
                                        {config.logoUrl && (
                                            <div className="mt-8 flex items-center justify-between p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-white rounded-lg p-1.5 shadow-sm">
                                                        <img src={config.logoUrl} className="w-full h-full object-contain" />
                                                    </div>
                                                    <div>
                                                        <p className="text-sm font-bold text-emerald-900 uppercase tracking-tighter">Archivo Cargado</p>
                                                        <button onClick={() => setConfig(c => ({...c, logoUrl: null}))} className="text-xs text-emerald-700 hover:underline">Eliminar imagen</button>
                                                    </div>
                                                </div>
                                                <LucideIcon name="CheckCircle" className="text-emerald-500" />
                                            </div>
                                        )}
                                    </Card>
                                )}

                                {activeTab === 'exportar' && (
                                    <div className="space-y-6">
                                        <Card className="border-t-4 border-brand-600">
                                            <h3 className="font-display font-bold text-xl mb-2">Resumen Masivo</h3>
                                            <p className="text-slate-500 text-sm mb-6">Estamos listos para generar y empaquetar tus códigos.</p>
                                            
                                            <div className="grid grid-cols-2 gap-4 mb-8">
                                                <div className="bg-slate-50 p-4 rounded-2xl">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase">Total a Procesar</div>
                                                    <div className="text-2xl font-bold font-display">{totalQRs} Unidades</div>
                                                </div>
                                                <div className="bg-slate-50 p-4 rounded-2xl">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase">Formato Exportación</div>
                                                    <div className="text-2xl font-bold font-display">PNG / ZIP</div>
                                                </div>
                                            </div>

                                            <div className="space-y-3">
                                                <Button 
                                                    className="w-full py-4 text-lg" 
                                                    icon="Archive" 
                                                    disabled={totalQRs === 0}
                                                    onClick={downloadAllZip}
                                                >
                                                    Descargar ZIP Completo
                                                </Button>
                                                <Button 
                                                    variant="secondary" 
                                                    className="w-full py-3" 
                                                    icon="Printer" 
                                                    onClick={() => window.print()}
                                                >
                                                    Abrir Vista de Impresión
                                                </Button>
                                            </div>
                                        </Card>

                                        <Card>
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <h3 className="font-bold text-slate-800">Ajustes de Galería</h3>
                                                    <p className="text-xs text-slate-400">Solo aplicable para la impresión</p>
                                                </div>
                                                <select 
                                                    className="bg-slate-50 border-none rounded-xl text-sm font-bold p-2 focus:ring-0"
                                                    value={config.printColumns}
                                                    onChange={e => setConfig(c => ({...c, printColumns: parseInt(e.target.value)}))}
                                                >
                                                    {[2,3,4,5,6].map(n => <option key={n} value={n}>{n} Columnas</option>)}
                                                </select>
                                            </div>
                                        </Card>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Preview Section */}
                        <div className="w-full lg:w-[480px] bg-white border-l border-slate-100 flex flex-col p-6 lg:p-10 z-10">
                            <div className="flex-1 flex flex-col items-center justify-center space-y-8">
                                <div className="text-center space-y-1">
                                    <div className="inline-block px-3 py-1 bg-brand-50 text-brand-700 rounded-full text-[10px] font-extrabold uppercase tracking-widest mb-2">Vista Previa</div>
                                    <h2 className="font-display text-2xl font-bold">Monitor de Diseño</h2>
                                </div>

                                <div className="relative group">
                                    <div className="absolute -inset-1 bg-gradient-to-r from-brand-500 to-blue-500 rounded-3xl blur opacity-25 group-hover:opacity-40 transition duration-1000 group-hover:duration-200"></div>
                                    <div className="relative p-6 bg-white rounded-3xl shadow-premium border border-slate-100 overflow-hidden qr-gradient-bg">
                                        <div ref={qrRef} className="w-[280px] h-[280px] flex items-center justify-center animate-pulse-subtle">
                                            {/* QR Injected here */}
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 text-center">
                                    <p className="text-xs font-bold text-slate-800 uppercase tracking-tight truncate">
                                        {bulkText.split('\n').filter(l => l.trim())[0]?.split(' ')[0] || 'esperando datos...'}
                                    </p>
                                    <p className="text-[10px] text-slate-400 mt-1">Referencia del primer elemento</p>
                                </div>
                            </div>
                            
                            <div className="mt-10 p-6 bg-brand-900 rounded-2xl text-white shadow-xl shadow-brand-900/20">
                                <p className="text-xs font-medium opacity-70 mb-1">Status Actual</p>
                                <div className="flex items-center justify-between">
                                    <span className="text-lg font-display font-bold">{totalQRs} Códigos</span>
                                    <div className="animate-pulse flex gap-1">
                                        <div className="w-1.5 h-1.5 bg-emerald-400 rounded-full"></div>
                                        <div className="w-1.5 h-1.5 bg-emerald-400 rounded-full opacity-50"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Print Gallery */}
                    <div className="hidden print-area p-8 animate-fade-in">
                        <header className="flex items-center justify-between mb-10 pb-6 border-b-2 border-slate-100">
                            <h1 className="text-2xl font-display font-black uppercase tracking-tighter italic">Lote de Códigos QR <span className="text-brand-600">PRO</span></h1>
                            <div className="text-xs font-bold text-slate-400 uppercase tracking-widest">Página 1 / {Math.ceil(totalQRs / (config.printColumns * 5))}</div>
                        </header>
                        
                        <div 
                            className="grid gap-6 items-start"
                            style={{ 
                                gridTemplateColumns: `repeat(${config.printColumns}, minmax(0, 1fr))`,
                            }}
                        >
                            {bulkText.split('\n').filter(l => l.trim() !== '').map((line, idx) => (
                                <QRCodeItem key={idx} line={line} options={qrOptions} />
                            ))}
                        </div>
                        
                        <footer className="mt-10 pt-4 border-t border-slate-100 text-[10px] text-center text-slate-400">
                            Generado dinámicamente con QR Studio Pro - Todos los derechos reservados © 2026
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
